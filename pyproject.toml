[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "armilar-data-pipeline"
version = "0.1.0"
description = "Automated, auditable acquisition pipeline for the Armilar global purchasing-power index"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "Armilar Project"}]
dependencies = []

[project.scripts]
armilar-data = "armilar_pipeline.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
