name: Build ICP 2021 Armilar matrix

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "public/latest/**"
  schedule:
    - cron: "17 05 * * 1"

permissions:
  contents: write

concurrency:
  group: armilar-step2-icp2021
  cancel-in-progress: false

jobs:
  build-step2:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Restore last-known-good source cache
        uses: actions/cache@v4
        with:
          path: .cache/armilar
          key: armilar-icp2021-v4-${{ github.run_id }}
          restore-keys: |
            armilar-icp2021-v4-
            armilar-icp2021-v2-

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Acquire official data and construct Step 2 outputs
        run: |
          python -m armilar_pipeline run-step2 \
            --config config/step2_icp2021.json \
            --run-dir run \
            --cache-dir .cache/armilar \
            --output-dir artifacts

      - name: Validate generated summary and exact research weight sum
        run: |
          python - <<'PY'
          import csv
          import json
          from decimal import Decimal

          summary = json.load(open("run/outputs/step2_summary.json", encoding="utf-8"))
          print(json.dumps(summary, indent=2, ensure_ascii=False))
          if summary["research_release_allowed"]:
              with open("run/outputs/weights_observed_universe.csv", encoding="utf-8", newline="") as handle:
                  total = sum((Decimal(row["weight"]) for row in csv.DictReader(handle)), Decimal("0"))
              if total != Decimal("1"):
                  raise SystemExit(f"Research weight sum is {total}, expected exactly 1")
          if summary["monetary_release_allowed"]:
              raise SystemExit("Step 2 pipeline must not authorize monetary use")
          PY

      - name: Upload complete acquisition bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: armilar-step2-${{ github.run_id }}
          path: |
            artifacts/*.zip
            artifacts/latest_run_summary.json
            run/manifest.json
            run/diagnostics.json
            run/SHA256SUMS
            run/STEP2_REPORT.md
            run/outputs/*.csv
            run/outputs/*.json
          if-no-files-found: warn
          retention-days: 90

      - name: Publish latest diagnostics and matrices
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          rm -rf public/latest
          mkdir -p public/latest
          cp run/manifest.json public/latest/manifest.json
          cp run/diagnostics.json public/latest/diagnostics.json
          cp run/SHA256SUMS public/latest/SHA256SUMS
          cp run/STEP2_REPORT.md public/latest/STEP2_REPORT.md
          for file in \
            step2_summary.json \
            normalized_icp2021.csv \
            raw_economy_heading_matrix.csv \
            supplemental_nominal_all_sources.csv \
            nominal_source_selection_audit.csv \
            unit_reconciliation.csv \
            economy_category_matrix.csv \
            economy_category_matrix_weight_eligible.csv \
            economy_registry.csv \
            coverage_report.csv \
            missing_data_report.csv \
            exclusions_report.csv \
            weights_observed_universe.csv \
            weights_experimental_universe.csv \
            weights_final.csv \
            weights_by_category.csv \
            weights_by_economy.csv \
            officially_imputed_aggregate_only_economies.csv \
            participation_mapping_audit.csv \
            measure_selection_audit.csv \
            measure_identity_audit.csv \
            supplemental_source_diagnostics.csv \
            source_acquisition_failures.csv \
            source90_concepts.csv \
            source90_variable_inventory.csv \
            source_probe_candidate_results.csv \
            source_probe_economy_summary.csv \
            source_probe_failures.csv \
            source_probe_summary.json \
            economy_gap_priority.csv \
            gap_priority_summary.json \
            proxy_financing_exposure.csv \
            proxy_ppp_comparison.csv \
            proxy_validation_summary.json \
            country_adapter_status.csv \
            country_source_evidence.csv \
            country_normalized_rows.csv \
            country_mapping_audit.csv \
            country_reconciliation_audit.csv \
            country_adapter_failures.csv \
            methodology_policy_snapshot.json
          do
            cp "run/outputs/$file" "public/latest/$file"
          done

      - name: Commit public latest outputs
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/latest
          if git diff --cached --quiet; then
            echo "No public outputs changed."
          else
            git commit -m "Publish latest ICP 2021 Step 2 outputs"
            git push
          fi

      - name: Replace rolling data release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release delete data-latest --cleanup-tag --yes 2>/dev/null || true
          BUNDLE=$(find artifacts -maxdepth 1 -name 'armilar_step2_icp2021_*.zip' -print -quit)
          gh release create data-latest \
            "$BUNDLE" \
            run/manifest.json \
            run/diagnostics.json \
            run/SHA256SUMS \
            run/STEP2_REPORT.md \
            --target "$(git rev-parse HEAD)" \
            --title "Latest Armilar ICP 2021 Step 2 bundle" \
            --notes "Automated ICP 2021 and official national-accounts acquisition. Use the research matrix only when research_release_allowed=true. weights_final.csv remains empty until the full global scope passes every gate." \
            --prerelease
