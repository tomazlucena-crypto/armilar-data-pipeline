name: Build ICP 2021 Armilar matrix

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths-ignore:
      - "public/latest/**"
  schedule:
    - cron: "17 05 * * 1"

permissions:
  contents: write

concurrency:
  group: armilar-step2-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-step2:
    name: build-step2
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run unit tests
        run: python -m pytest -q

      - name: Compile Python sources
        run: python -m compileall -q src

      - name: Validate development contracts
        run: python scripts/validate_development_contracts.py

      - name: Validate version source of truth
        run: python scripts/check_version_consistency.py

      - name: Generate development telemetry
        run: |
          mkdir -p artifacts
          python scripts/generate_development_metrics.py \
            --output artifacts/development_metrics.json \
            --baseline-ref origin/main \
            --fail-on-test-regression

      - name: Upload development telemetry
        uses: actions/upload-artifact@v4
        with:
          name: development-metrics
          path: artifacts/development_metrics.json
          if-no-files-found: error
          retention-days: 30

      - name: Validate release safety contracts
        run: |
          python - <<'PY'
          import csv
          import json
          from pathlib import Path
          from armilar_pipeline.version import installed_version

          config = json.loads(
              Path("config/step2_icp2021.json").read_text(encoding="utf-8")
          )
          project_version = installed_version()
          if "pipeline_version" in config:
              raise SystemExit("config/step2_icp2021.json must not author pipeline_version")

          weights_final = Path("public/latest/weights_final.csv")
          if weights_final.exists():
              with weights_final.open(encoding="utf-8", newline="") as handle:
                  rows = list(csv.DictReader(handle))
              if rows:
                  raise SystemExit(
                      "public/latest/weights_final.csv must remain empty before "
                      "the complete global matrix passes every gate"
                  )

          print(
              json.dumps(
                  {
                      "project_version": project_version,
                      "pull_request_live_acquisition": False,
                      "monetary_release_allowed": False,
                      "weights_final_data_rows": 0,
                  },
                  indent=2,
              )
          )
          PY

  sdmx-spike:
    name: sdmx-spike
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install SDMX spike dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[sdmx]"

      - name: Run manual SDMX smoke spike
        run: |
          mkdir -p artifacts/sdmx_spike
          python scripts/run_sdmx_spike.py --output artifacts/sdmx_spike --live

      - name: Upload SDMX spike artefact
        uses: actions/upload-artifact@v4
        with:
          name: sdmx-spike
          path: artifacts/sdmx_spike
          if-no-files-found: error
          retention-days: 30

  refresh-step2:
    name: refresh-step2
    if: github.event_name != 'pull_request'
    needs: build-step2
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Restore last-known-good source cache
        uses: actions/cache@v4
        with:
          path: .cache/armilar
          key: armilar-icp2021-v5-${{ github.run_id }}
          restore-keys: |
            armilar-icp2021-v5-
            armilar-icp2021-v4-
            armilar-icp2021-v2-

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Acquire official data and construct Step 2 outputs
        shell: bash
        run: |
          set -euo pipefail

          (
            while sleep 300; do
              echo "::notice::Armilar live acquisition is still running."
            done
          ) &
          heartbeat_pid=$!

          cleanup() {
            kill "$heartbeat_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          python -u -m armilar_pipeline run-step2 \
            --config config/step2_icp2021.json \
            --run-dir run \
            --cache-dir .cache/armilar \
            --output-dir artifacts

      - name: Validate generated summary and exact research weight sum
        run: |
          python - <<'PY'
          import csv
          import json
          from decimal import Decimal

          summary = json.load(
              open("run/outputs/step2_summary.json", encoding="utf-8")
          )
          print(json.dumps(summary, indent=2, ensure_ascii=False))

          if summary["research_release_allowed"]:
              with open(
                  "run/outputs/weights_observed_universe.csv",
                  encoding="utf-8",
                  newline="",
              ) as handle:
                  total = sum(
                      (
                          Decimal(row["weight"])
                          for row in csv.DictReader(handle)
                      ),
                      Decimal("0"),
                  )
              if total != Decimal("1"):
                  raise SystemExit(
                      f"Research weight sum is {total}, expected exactly 1"
                  )

          if summary["monetary_release_allowed"]:
              raise SystemExit(
                  "Step 2 pipeline must not authorize monetary use"
              )
          PY

      - name: Upload complete acquisition bundle
        if: always() && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: armilar-step2-${{ github.run_id }}
          path: |
            artifacts/*.zip
            artifacts/latest_run_summary.json
            run/manifest.json
            run/diagnostics.json
            run/SHA256SUMS
            run/STEP2_REPORT.md
            run/outputs/source_probe_family_coverage.csv
            run/outputs/proxy_error_by_category.csv
            run/outputs/proxy_error_by_economy.csv
            run/outputs/india_methodology_gate_audit.csv
            run/outputs/russia_methodology_gate_audit.csv
            run/outputs/china_methodology_gate_audit.csv
            run/outputs/indonesia_methodology_gate_audit.csv
            run/outputs/brazil_methodology_gate_audit.csv
            run/outputs/egypt_methodology_gate_audit.csv
            run/outputs/pakistan_methodology_gate_audit.csv
            run/outputs/nigeria_methodology_gate_audit.csv
            run/outputs/bangladesh_methodology_gate_audit.csv
            run/outputs/vietnam_methodology_gate_audit.csv
            run/outputs/step2h_exception_audit.csv
            run/outputs/INDIA_METHOD_GATE_REPORT.md
            run/outputs/RUSSIA_METHOD_GATE_REPORT.md
            run/outputs/CHINA_METHOD_GATE_REPORT.md
            run/outputs/BRAZIL_METHOD_GATE_REPORT.md
            run/outputs/EGYPT_METHOD_GATE_REPORT.md
            run/outputs/PAKISTAN_METHOD_GATE_REPORT.md
            run/outputs/NIGERIA_METHOD_GATE_REPORT.md
            run/outputs/BANGLADESH_METHOD_GATE_REPORT.md
            run/outputs/VIETNAM_METHOD_GATE_REPORT.md
            run/outputs/*.csv
            run/outputs/*.json
            run/outputs/*.md
          if-no-files-found: warn
          retention-days: 90

      - name: Publish latest diagnostics and matrices
        if: success() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail

          rm -rf public/latest
          mkdir -p public/latest

          cp run/manifest.json public/latest/manifest.json
          cp run/diagnostics.json public/latest/diagnostics.json
          cp run/SHA256SUMS public/latest/SHA256SUMS
          cp run/STEP2_REPORT.md public/latest/STEP2_REPORT.md
          cp run/outputs/*.csv public/latest/
          cp run/outputs/*.json public/latest/
          cp run/outputs/*.md public/latest/

      - name: Commit public latest outputs
        if: success() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/latest

          if git diff --cached --quiet; then
            echo "No public outputs changed."
          else
            git commit -m "Publish latest ICP 2021 Step 2 outputs"
            git push
          fi

      - name: Replace rolling data release
        if: success() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          gh release delete data-latest --cleanup-tag --yes \
            2>/dev/null || true

          BUNDLE=$(
            find artifacts -maxdepth 1 \
              -name 'armilar_step2_icp2021_*.zip' \
              -print -quit
          )

          gh release create data-latest \
            "$BUNDLE" \
            run/manifest.json \
            run/diagnostics.json \
            run/SHA256SUMS \
            run/STEP2_REPORT.md \
            --target "$(git rev-parse HEAD)" \
            --title "Latest Armilar ICP 2021 Step 2 bundle" \
            --notes "Automated ICP 2021 and official national-accounts acquisition.
          Use the research matrix only when research_release_allowed=true.
          weights_final.csv remains empty until the full global scope passes every gate." \
            --prerelease
